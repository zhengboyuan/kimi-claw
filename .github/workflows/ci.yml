name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  qa-gate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pandas numpy
    
    - name: Syntax Check
      working-directory: ./taienergy-analytics
      run: |
        python3 -m py_compile workflows/daily_v5.py
        python3 -m py_compile core/memory_system.py
        echo "Syntax check passed"
